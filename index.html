<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: #4f6ef7;
      color: #fff;
      padding: 24px 28px 20px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header .summary {
      font-size: 0.82rem;
      opacity: 0.82;
      margin-top: 4px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .input-row input {
      flex: 1;
      border: 1.5px solid #d8dce8;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-row input:focus { border-color: #4f6ef7; }

    .input-row button {
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      line-height: 1;
    }

    .input-row button:hover { background: #3a57d4; }
    .input-row button:active { transform: scale(0.94); }

    .list {
      list-style: none;
      padding: 8px 0;
      min-height: 48px;
    }

    .empty {
      text-align: center;
      color: #b0b5c8;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      transition: background 0.12s;
      animation: slideIn 0.18s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover { background: #f7f8fc; }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f6ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item label {
      flex: 1;
      font-size: 0.97rem;
      color: #1a1d2e;
      cursor: pointer;
      word-break: break-all;
      transition: color 0.15s;
    }

    .item.done label {
      text-decoration: line-through;
      color: #b0b5c8;
    }

    .del-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .del-btn:hover { color: #e94f4f; background: #fff0f0; }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px 16px;
      border-top: 1px solid #f0f0f0;
    }

    footer span {
      font-size: 0.82rem;
      color: #9aa0b5;
    }

    .clear-btn {
      background: none;
      border: none;
      font-size: 0.82rem;
      color: #c0c5d8;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .clear-btn:hover { color: #e94f4f; background: #fff0f0; }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h1>🛒 쇼핑 리스트</h1>
      <div class="summary" id="summary">항목 없음</div>
    </header>

    <div class="input-row">
      <input type="text" id="new-item" placeholder="항목 입력..." maxlength="80" autocomplete="off">
      <button id="add-btn" title="추가">＋</button>
    </div>

    <ul class="list" id="list"></ul>

    <footer>
      <span id="done-count"></span>
      <button class="clear-btn" id="clear-done">완료 항목 삭제</button>
    </footer>
  </div>

  <script>
    const STORAGE_KEY = 'shopping-list-v1';

    let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    const listEl      = document.getElementById('list');
    const input       = document.getElementById('new-item');
    const addBtn      = document.getElementById('add-btn');
    const summaryEl   = document.getElementById('summary');
    const doneCountEl = document.getElementById('done-count');
    const clearDoneBtn = document.getElementById('clear-done');

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function updateSummary() {
      const total = items.length;
      const done  = items.filter(i => i.done).length;
      summaryEl.textContent   = total === 0 ? '항목 없음' : `전체 ${total}개`;
      doneCountEl.textContent = total === 0 ? '' : `${done} / ${total} 완료`;
    }

    function render() {
      listEl.innerHTML = '';

      if (items.length === 0) {
        listEl.innerHTML = '<li class="empty">아직 항목이 없어요.<br>위에서 추가해 보세요!</li>';
        updateSummary();
        return;
      }

      items.forEach((item, idx) => {
        const li = document.createElement('li');
        li.className = 'item' + (item.done ? ' done' : '');

        const cb = document.createElement('input');
        cb.type    = 'checkbox';
        cb.checked = item.done;
        cb.id      = `cb-${idx}`;
        cb.addEventListener('change', () => {
          items[idx].done = cb.checked;
          save();
          render();
        });

        const label = document.createElement('label');
        label.htmlFor   = `cb-${idx}`;
        label.textContent = item.text;

        const delBtn = document.createElement('button');
        delBtn.className   = 'del-btn';
        delBtn.textContent = '✕';
        delBtn.title       = '삭제';
        delBtn.addEventListener('click', () => {
          items.splice(idx, 1);
          save();
          render();
        });

        li.append(cb, label, delBtn);
        listEl.appendChild(li);
      });

      updateSummary();
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, done: false });
      input.value = '';
      save();
      render();
    }

    addBtn.addEventListener('click', addItem);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    clearDoneBtn.addEventListener('click', () => {
      items = items.filter(i => !i.done);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
